<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>TRAIL QUEST WORLD - ホーム</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ===== Home Screen Specific ===== */
    body {
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    .mobile-frame {
      background: var(--bg-dark);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 8px;
    }

    .logo-area {
      display: flex;
      flex-direction: column;
    }

    .logo-area .title-game {
      font-size: 1.1rem;
    }

    .logo-area .subtitle {
      font-size: 0.6rem;
      margin-top: 2px;
    }

    .settings-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(197, 160, 63, 0.3);
      color: var(--text-gray);
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Player Info */
    .player-card {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }

    .avatar-ring {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      padding: 2px;
      box-shadow: var(--glow-gold);
      flex-shrink: 0;
    }

    .avatar-ring .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a3060, #1a2040);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    .player-info {
      flex: 1;
    }

    .player-name {
      font-size: 1rem;
      font-weight: 900;
      color: var(--text-white);
    }

    .player-level {
      font-size: 0.7rem;
      color: var(--gold);
      margin-top: 2px;
    }

    .exp-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .exp-fill {
      width: 65%;
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold));
      border-radius: 2px;
    }

    .alt-badge {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #1a1000;
      font-size: 0.65rem;
      font-weight: 900;
      padding: 4px 10px;
      border-radius: 20px;
      text-align: center;
      white-space: nowrap;
    }

    .alt-badge .alt-value {
      font-size: 0.85rem;
    }

    /* Main Buttons */
    .main-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .action-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 16px;
      border: 2px solid var(--gold-dark);
      pointer-events: none;
    }

    .action-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .btn-battle-main {
      background: linear-gradient(135deg, #cc1122 0%, #991122 50%, #771122 100%);
      box-shadow: 0 6px 24px rgba(204, 17, 34, 0.4), 0 0 20px rgba(255, 215, 0, 0.15);
    }

    .btn-quest-main {
      background: linear-gradient(135deg, #1a3388 0%, #112266 50%, #0a1844 100%);
      box-shadow: 0 6px 24px rgba(26, 51, 136, 0.4), 0 0 20px rgba(255, 215, 0, 0.15);
    }

    .action-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5));
    }

    .action-text {
      display: flex;
      flex-direction: column;
    }

    .action-title {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--gold-light);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .action-desc {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 2px;
    }

    .action-arrow {
      margin-left: auto;
      font-size: 1.2rem;
      color: var(--gold-dark);
    }

    /* Ranking */
    .ranking-section {
      margin-top: 16px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 900;
      color: var(--gold);
    }

    .see-all {
      font-size: 0.65rem;
      color: var(--text-gray);
      text-decoration: none;
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .rank-num {
      font-size: 1.1rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
    }

    .rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }

    .rank-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a3060, #1a2040);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      border: 1px solid rgba(197, 160, 63, 0.3);
    }

    .rank-info {
      flex: 1;
    }

    .rank-name {
      font-size: 0.8rem;
      font-weight: 700;
    }

    .rank-score {
      font-size: 0.65rem;
      color: var(--text-gray);
      margin-top: 1px;
    }

    .rank-badge {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
      background: rgba(255, 215, 0, 0.1);
      color: var(--gold);
      border: 1px solid rgba(255, 215, 0, 0.2);
    }

    /* Bottom Nav */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 20px;
      background: linear-gradient(180deg, transparent, rgba(10, 14, 26, 0.95));
      z-index: 10;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: var(--text-gray);
      font-size: 0.55rem;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--gold);
    }

    .nav-icon {
      font-size: 1.2rem;
    }

    /* Spacer for content */
    .content {
      padding-bottom: 70px;
    }
  </style>
</head>
<body>

<div class="mobile-frame">
  <img src="assets/images/bg-home.png" class="bg-image" alt="背景">
  <div class="bg-overlay"></div>

  <div class="content">
    <!-- Header -->
    <div class="header animate-fadeIn">
      <div class="logo-area">
        <div class="title-game">TRAIL QUEST WORLD</div>
        <div class="subtitle">FANTASY CARD BATTLE</div>
      </div>
      <button class="settings-btn">⚙</button>
    </div>

    <div class="divider"></div>

    <!-- Player Info -->
    <div class="player-card card-panel animate-fadeIn" style="animation-delay: 0.1s;">
      <div class="avatar-ring">
        <div class="avatar">🐉</div>
      </div>
      <div class="player-info">
        <div class="player-name">竜騎士タクミ</div>
        <div class="player-level">Lv.42 ・ ランク: ゴールドII</div>
        <div class="exp-bar">
          <div class="exp-fill"></div>
        </div>
      </div>
      <div class="alt-badge">
        ALT<br>
        <span class="alt-value">3,280</span>
      </div>
    </div>

    <!-- Main Action Buttons -->
    <div class="main-actions">
      <a href="battle-start.html" class="action-btn btn-battle-main animate-fadeIn" style="animation-delay: 0.2s;">
        <img src="assets/images/icon-sword.png" class="action-icon" alt="バトル">
        <div class="action-text">
          <div class="action-title">⚔️ バトル</div>
          <div class="action-desc">リアルタイム対戦に挑め</div>
        </div>
        <div class="action-arrow">›</div>
      </a>

      <a href="deck-select.html" class="action-btn btn-quest-main animate-fadeIn" style="animation-delay: 0.3s;">
        <img src="assets/images/icon-book.png" class="action-icon" alt="クエスト">
        <div class="action-text">
          <div class="action-title">📖 デッキクエスト</div>
          <div class="action-desc">デッキを選んで冒険へ</div>
        </div>
        <div class="action-arrow">›</div>
      </a>
    </div>

    <!-- Ranking Preview -->
    <div class="ranking-section animate-fadeIn" style="animation-delay: 0.4s;">
      <div class="section-header">
        <div class="section-title">🏆 ランキング</div>
        <a href="#" class="see-all">すべて見る ›</a>
      </div>

      <div class="ranking-list">
        <div class="rank-item">
          <div class="rank-num rank-1">1</div>
          <div class="rank-avatar">👑</div>
          <div class="rank-info">
            <div class="rank-name">魔王ユウキ</div>
            <div class="rank-score">勝率 89% ・ 2,450pt</div>
          </div>
          <div class="rank-badge">Master</div>
        </div>

        <div class="rank-item">
          <div class="rank-num rank-2">2</div>
          <div class="rank-avatar">⚡</div>
          <div class="rank-info">
            <div class="rank-name">雷帝サクラ</div>
            <div class="rank-score">勝率 85% ・ 2,310pt</div>
          </div>
          <div class="rank-badge">Master</div>
        </div>

        <div class="rank-item">
          <div class="rank-num rank-3">3</div>
          <div class="rank-avatar">🔥</div>
          <div class="rank-info">
            <div class="rank-name">炎龍レン</div>
            <div class="rank-score">勝率 82% ・ 2,180pt</div>
          </div>
          <div class="rank-badge">Diamond</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="home.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span>ホーム</span>
    </a>
    <a href="deck-select.html" class="nav-item">
      <span class="nav-icon">🃏</span>
      <span>デッキ</span>
    </a>
    <a href="battle-start.html" class="nav-item">
      <span class="nav-icon">⚔️</span>
      <span>バトル</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">🏪</span>
      <span>ショップ</span>
    </a>
    <a href="#" class="nav-item">
      <span class="nav-icon">👤</span>
      <span>その他</span>
    </a>
  </div>
</div>

<!-- Page Navigation -->
<nav class="page-nav">
  <a href="home.html" class="active">ホーム</a>
  <a href="deck-select.html">デッキ選択</a>

  <a href="battle.html">バトル</a>

</body>
</html>
