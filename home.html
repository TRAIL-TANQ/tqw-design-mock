<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>TRAIL QUEST WORLD - ホーム</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ============================================
       Home Screen Specific Styles
       ============================================ */
    .home-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .home-header__logo {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      opacity: 0.8;
    }

    .home-header__alt {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255, 215, 0, 0.08);
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255, 215, 0, 0.15);
    }

    .home-header__alt img {
      width: 18px;
      height: 18px;
    }

    .home-header__alt-value {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--gold);
    }

    /* Player Card */
    .player-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      margin-top: 12px;
    }

    .player-card__avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .player-card__avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--gold-dark);
      background: linear-gradient(135deg, #2a2f4a, #1a1f3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .player-card__level {
      position: absolute;
      bottom: -4px;
      right: -4px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #1a1000;
      font-size: 0.6rem;
      font-weight: 900;
      padding: 2px 6px;
      border-radius: var(--radius-pill);
      font-family: var(--font-display);
    }

    .player-card__info { flex: 1; min-width: 0; }

    .player-card__name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .player-card__rank {
      font-size: 0.7rem;
      color: var(--gold);
      font-weight: 500;
    }

    .player-card__stats {
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }

    .player-card__stat {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .player-card__stat-value {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--text-primary);
    }

    /* Main Action Cards */
    .home-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
      flex: 1;
      justify-content: center;
    }

    .action-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition-fast);
      text-decoration: none;
    }

    .action-card:active { transform: scale(0.98); }

    .action-card--battle {
      background: linear-gradient(135deg, rgba(192, 57, 43, 0.85), rgba(139, 26, 26, 0.9));
      border: 1px solid rgba(255, 215, 0, 0.25);
      box-shadow: 0 4px 20px rgba(192, 57, 43, 0.3), 0 0 15px rgba(255, 215, 0, 0.1);
    }

    .action-card--quest {
      background: linear-gradient(135deg, rgba(41, 128, 185, 0.85), rgba(26, 82, 118, 0.9));
      border: 1px solid rgba(255, 215, 0, 0.25);
      box-shadow: 0 4px 20px rgba(41, 128, 185, 0.3), 0 0 15px rgba(255, 215, 0, 0.1);
    }

    .action-card__icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    .action-card__text { flex: 1; }

    .action-card__title {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--gold-light);
      text-shadow: 0 2px 4px rgba(0,0,0,0.4);
      margin-bottom: 4px;
    }

    .action-card__desc {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .action-card__arrow {
      font-size: 1.5rem;
      color: var(--gold);
      opacity: 0.5;
    }

    .action-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: btn-shimmer 4s ease-in-out infinite;
    }

    /* Ranking Preview */
    .ranking-preview { margin-top: 16px; }

    .ranking-preview__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .ranking-preview__title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ranking-preview__title img {
      width: 18px;
      height: 18px;
    }

    .ranking-preview__link {
      font-size: 0.7rem;
      color: var(--gold);
      text-decoration: none;
      opacity: 0.7;
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(26, 31, 58, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .ranking-item__avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a2f4a, #1a1f3a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ranking-item__name {
      flex: 1;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .ranking-item__rate {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gold);
    }
  </style>
</head>
<body>
  <!-- Dev Navigation -->
  <nav class="page-nav">
    <a href="home.html" class="active">Home</a>
    <a href="deck-select.html">Deck</a>
    <a href="deck-phase.html">Phase</a>
    <a href="battle.html">Battle</a>
    <a href="quest.html">Quest</a>
    <a href="shop.html">Shop</a>
    <a href="ranking.html">Rank</a>
  </nav>

  <div class="mobile-frame">
    <!-- Background -->
    <img src="assets/backgrounds/bg-home.png" alt="" class="bg-image">
    <div class="bg-overlay"></div>

    <!-- Content -->
    <div class="content">
      <!-- Header -->
      <header class="home-header animate-fadeInUp">
        <span class="home-header__logo">TRAIL QUEST WORLD</span>
        <div class="home-header__alt">
          <img src="assets/icons/icon-coin.png" alt="ALT">
          <span class="home-header__alt-value">2,450</span>
        </div>
      </header>

      <!-- Player Card -->
      <div class="player-card glass-panel animate-fadeInUp delay-1">
        <div class="player-card__avatar-wrap">
          <div class="player-card__avatar">🧙</div>
          <span class="player-card__level">Lv.12</span>
        </div>
        <div class="player-card__info">
          <div class="player-card__name">冒険者タロウ</div>
          <div class="player-card__rank">ゴールドランク III</div>
          <div class="player-card__stats">
            <div class="player-card__stat">
              勝率 <span class="player-card__stat-value">67%</span>
            </div>
            <div class="player-card__stat">
              Elo <span class="player-card__stat-value">1,520</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Actions -->
      <div class="home-actions">
        <a href="deck-select.html" class="action-card action-card--battle animate-fadeInUp delay-2">
          <img src="assets/icons/icon-sword.png" alt="" class="action-card__icon">
          <div class="action-card__text">
            <div class="action-card__title">バトル</div>
            <div class="action-card__desc">デッキを選んで対戦に挑め</div>
          </div>
          <span class="action-card__arrow">›</span>
        </a>

        <a href="quest.html" class="action-card action-card--quest animate-fadeInUp delay-3">
          <img src="assets/icons/icon-book.png" alt="" class="action-card__icon">
          <div class="action-card__text">
            <div class="action-card__title">デッキクエスト</div>
            <div class="action-card__desc">学んで新しいカードを獲得</div>
          </div>
          <span class="action-card__arrow">›</span>
        </a>
      </div>

      <!-- Ranking Preview -->
      <div class="ranking-preview animate-fadeInUp delay-4">
        <div class="ranking-preview__header">
          <div class="ranking-preview__title">
            <img src="assets/icons/icon-trophy.png" alt="">
            ランキング TOP3
          </div>
          <a href="ranking.html" class="ranking-preview__link">すべて見る ›</a>
        </div>
        <div class="ranking-list">
          <div class="ranking-item">
            <div class="medal medal--gold">1</div>
            <div class="ranking-item__avatar">👑</div>
            <span class="ranking-item__name">マスター太郎</span>
            <span class="ranking-item__rate">2,180</span>
          </div>
          <div class="ranking-item">
            <div class="medal medal--silver">2</div>
            <div class="ranking-item__avatar">⚔️</div>
            <span class="ranking-item__name">クイズ王</span>
            <span class="ranking-item__rate">2,050</span>
          </div>
          <div class="ranking-item">
            <div class="medal medal--bronze">3</div>
            <div class="ranking-item__avatar">🎯</div>
            <span class="ranking-item__name">知識の探求者</span>
            <span class="ranking-item__rate">1,980</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav__item bottom-nav__item--active">
        <img src="assets/icons/nav-home.svg" alt="">
        <span>ホーム</span>
      </a>
      <a href="deck-select.html" class="bottom-nav__item">
        <img src="assets/icons/nav-battle.svg" alt="">
        <span>バトル</span>
      </a>
      <a href="shop.html" class="bottom-nav__item">
        <img src="assets/icons/nav-shop.svg" alt="">
        <span>ショップ</span>
      </a>
      <a href="#" class="bottom-nav__item">
        <img src="assets/icons/nav-settings.svg" alt="">
        <span>設定</span>
      </a>
    </nav>
  </div>
</body>
</html>
