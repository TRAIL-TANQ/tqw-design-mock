<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>TRAIL QUEST WORLD - デッキ選択</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ============================================
       Deck Select Screen
       ============================================ */
    .deck-select-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }

    .deck-select-header__back {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-glass);
      backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 1.1rem;
    }

    .deck-select-header__title {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .deck-select-header__subtitle {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    /* Deck Grid */
    .deck-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
      flex: 1;
      align-content: start;
    }

    .deck-card {
      position: relative;
      padding: 16px 12px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(26, 31, 58, 0.9), rgba(15, 20, 40, 0.95));
      border: 2px solid rgba(255, 255, 255, 0.06);
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .deck-card:active { transform: scale(0.96); }

    .deck-card--unlocked {
      border-color: rgba(197, 160, 63, 0.3);
    }

    .deck-card--unlocked::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.06), transparent);
      animation: btn-shimmer 5s ease-in-out infinite;
    }

    .deck-card--selected {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.25);
      animation: pulse-border 2s ease-in-out infinite;
    }

    .deck-card--locked {
      filter: grayscale(0.6);
      opacity: 0.6;
    }

    .deck-card__icon {
      font-size: 2.2rem;
      margin-bottom: 4px;
    }

    .deck-card__name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .deck-card__count {
      font-size: 0.65rem;
      color: var(--text-secondary);
    }

    .deck-card__rarity-bar {
      width: 100%;
      height: 3px;
      border-radius: 2px;
      margin-top: 4px;
    }

    .deck-card__rarity-bar--gold {
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-dark));
    }

    .deck-card__rarity-bar--silver {
      background: linear-gradient(90deg, #808080, #c0c0c0, #808080);
    }

    .deck-card__rarity-bar--blue {
      background: linear-gradient(90deg, #1a5276, #3498db, #1a5276);
    }

    .deck-card__lock {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      opacity: 0.7;
    }

    .deck-card__lock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 14, 26, 0.5);
      backdrop-filter: blur(2px);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .deck-card__lock-overlay img {
      width: 32px;
      height: 32px;
      opacity: 0.6;
    }

    /* Bottom Actions */
    .deck-select-actions {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .deck-select-actions__link {
      text-align: center;
      font-size: 0.8rem;
      color: var(--gold);
      text-decoration: none;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <nav class="page-nav">
    <a href="home.html">Home</a>
    <a href="deck-select.html" class="active">Deck</a>
    <a href="deck-phase.html">Phase</a>
    <a href="battle.html">Battle</a>
    <a href="quest.html">Quest</a>
    <a href="shop.html">Shop</a>
    <a href="ranking.html">Rank</a>
  </nav>

  <div class="mobile-frame">
    <img src="assets/backgrounds/bg-home.png" alt="" class="bg-image">
    <div class="bg-overlay"></div>

    <div class="content">
      <!-- Header -->
      <div class="deck-select-header animate-fadeInUp">
        <a href="home.html" class="deck-select-header__back">‹</a>
        <div>
          <div class="deck-select-header__title">デッキ選択</div>
          <div class="deck-select-header__subtitle">バトルに使うデッキを選ぼう</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Deck Grid -->
      <div class="deck-grid">
        <!-- Deck 1: Selected -->
        <div class="deck-card deck-card--unlocked deck-card--selected animate-fadeInUp delay-1">
          <div class="deck-card__icon">🌍</div>
          <div class="deck-card__name">世界地理</div>
          <div class="deck-card__count">カード 30枚</div>
          <div class="deck-card__rarity-bar deck-card__rarity-bar--gold"></div>
        </div>

        <!-- Deck 2 -->
        <div class="deck-card deck-card--unlocked animate-fadeInUp delay-2">
          <div class="deck-card__icon">🔬</div>
          <div class="deck-card__name">科学探究</div>
          <div class="deck-card__count">カード 28枚</div>
          <div class="deck-card__rarity-bar deck-card__rarity-bar--blue"></div>
        </div>

        <!-- Deck 3 -->
        <div class="deck-card deck-card--unlocked animate-fadeInUp delay-3">
          <div class="deck-card__icon">📜</div>
          <div class="deck-card__name">日本史</div>
          <div class="deck-card__count">カード 32枚</div>
          <div class="deck-card__rarity-bar deck-card__rarity-bar--gold"></div>
        </div>

        <!-- Deck 4 -->
        <div class="deck-card deck-card--unlocked animate-fadeInUp delay-4">
          <div class="deck-card__icon">🎨</div>
          <div class="deck-card__name">芸術文化</div>
          <div class="deck-card__count">カード 25枚</div>
          <div class="deck-card__rarity-bar deck-card__rarity-bar--silver"></div>
        </div>

        <!-- Deck 5: Locked -->
        <div class="deck-card deck-card--locked animate-fadeInUp delay-5">
          <div class="deck-card__icon">💻</div>
          <div class="deck-card__name">プログラミング</div>
          <div class="deck-card__count">Lv.15で解放</div>
          <div class="deck-card__rarity-bar deck-card__rarity-bar--silver"></div>
          <div class="deck-card__lock-overlay">
            <img src="assets/icons/icon-lock.png" alt="ロック">
          </div>
        </div>

        <!-- Deck 6: Locked -->
        <div class="deck-card deck-card--locked animate-fadeInUp delay-5">
          <div class="deck-card__icon">🧮</div>
          <div class="deck-card__name">数学チャレンジ</div>
          <div class="deck-card__count">Lv.20で解放</div>
          <div class="deck-card__rarity-bar deck-card__rarity-bar--silver"></div>
          <div class="deck-card__lock-overlay">
            <img src="assets/icons/icon-lock.png" alt="ロック">
          </div>
        </div>
      </div>

      <!-- Bottom Actions -->
      <div class="deck-select-actions">
        <a href="deck-phase.html" class="btn btn-battle btn-lg">出撃する</a>
        <a href="quest.html" class="deck-select-actions__link">新しいデッキを手に入れる →</a>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav__item">
        <img src="assets/icons/nav-home.svg" alt="">
        <span>ホーム</span>
      </a>
      <a href="deck-select.html" class="bottom-nav__item bottom-nav__item--active">
        <img src="assets/icons/nav-battle.svg" alt="">
        <span>バトル</span>
      </a>
      <a href="shop.html" class="bottom-nav__item">
        <img src="assets/icons/nav-shop.svg" alt="">
        <span>ショップ</span>
      </a>
      <a href="#" class="bottom-nav__item">
        <img src="assets/icons/nav-settings.svg" alt="">
        <span>設定</span>
      </a>
    </nav>
  </div>
</body>
</html>
