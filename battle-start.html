<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>TRAIL QUEST WORLD - バトル開始</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    body {
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    .mobile-frame {
      background: #000;
    }

    .bg-overlay {
      background: radial-gradient(
        ellipse at center 40%,
        rgba(10, 14, 26, 0.2) 0%,
        rgba(10, 14, 26, 0.6) 50%,
        rgba(10, 14, 26, 0.9) 100%
      );
    }

    .content {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* VS / Stage Label */
    .stage-label {
      font-size: 0.7rem;
      color: var(--text-gray);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
      animation: fadeIn 0.8s ease-out forwards;
    }

    /* Deck Showcase */
    .deck-showcase {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeIn 1s ease-out forwards;
    }

    .deck-icon-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26, 31, 58, 0.8), rgba(10, 14, 26, 0.9));
      border: 3px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.3), 0 0 80px rgba(255, 215, 0, 0.1);
      animation: float 3s ease-in-out infinite;
      position: relative;
    }

    .deck-icon-large::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(255, 215, 0, 0.2);
      animation: pulse 2s ease-in-out infinite;
    }

    .deck-icon-large::after {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(255, 215, 0, 0.1);
      animation: pulse 2s ease-in-out infinite 0.5s;
    }

    .deck-name-large {
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(255, 215, 0, 0.3));
      letter-spacing: 0.1em;
    }

    .deck-detail {
      font-size: 0.75rem;
      color: var(--text-gray);
    }

    .deck-detail span {
      color: var(--gold);
      font-weight: 700;
    }

    /* Particles */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat 4s ease-in-out infinite;
    }

    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(100px) scale(0); }
      20% { opacity: 0.8; }
      80% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-200px) scale(1); }
    }

    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 25%; animation-delay: 0.8s; }
    .particle:nth-child(3) { left: 40%; animation-delay: 1.6s; }
    .particle:nth-child(4) { left: 55%; animation-delay: 0.4s; }
    .particle:nth-child(5) { left: 70%; animation-delay: 1.2s; }
    .particle:nth-child(6) { left: 85%; animation-delay: 2s; }
    .particle:nth-child(7) { left: 15%; animation-delay: 2.4s; }
    .particle:nth-child(8) { left: 60%; animation-delay: 3s; }
    .particle:nth-child(9) { left: 80%; animation-delay: 1.8s; }
    .particle:nth-child(10) { left: 35%; animation-delay: 2.8s; }

    /* Battle Start Button */
    .battle-start-area {
      position: absolute;
      bottom: 60px;
      left: 16px;
      right: 16px;
      z-index: 10;
    }

    .battle-start-btn {
      display: block;
      width: 100%;
      padding: 20px;
      border: 3px solid var(--gold);
      border-radius: 16px;
      background: linear-gradient(180deg, #ee2233 0%, #cc1122 40%, #881122 100%);
      color: var(--gold-light);
      font-family: inherit;
      font-size: 1.5rem;
      font-weight: 900;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
      box-shadow:
        0 6px 30px rgba(204, 17, 34, 0.5),
        0 0 30px rgba(255, 215, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      letter-spacing: 0.15em;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .battle-start-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 80%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      animation: shimmer 2s ease-in-out infinite;
    }

    .battle-start-btn::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      animation: glow 2s ease-in-out infinite;
    }

    .battle-start-btn:hover {
      transform: scale(1.02);
      box-shadow:
        0 8px 40px rgba(204, 17, 34, 0.6),
        0 0 50px rgba(255, 215, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    /* Back link */
    .back-link {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
    }

    .back-link a {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(197, 160, 63, 0.3);
      color: var(--gold);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>

<div class="mobile-frame">
  <img src="assets/images/bg-battle.png" class="bg-image" alt="バトル背景">
  <div class="bg-overlay"></div>

  <!-- Particles -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Back -->
  <div class="back-link">
    <a href="deck-select.html">‹</a>
  </div>

  <div class="content">
    <div class="stage-label">── STAGE 3-2 ──</div>

    <div class="deck-showcase">
      <div class="deck-icon-large">🐉</div>
      <div class="deck-name-large">竜炎の咆哮</div>
      <div class="deck-detail">SR デッキ ・ <span>20</span> カード</div>
    </div>
  </div>

  <!-- Battle Start Button -->
  <div class="battle-start-area">
    <a href="battle.html" class="battle-start-btn">
      ⚔️ バトル開始！
    </a>
  </div>
</div>

<!-- Page Navigation -->
<nav class="page-nav">
  <a href="home.html">ホーム</a>
  <a href="deck-select.html">デッキ選択</a>
  <a href="battle-start.html" class="active">バトル開始</a>
  <a href="battle.html">バトル</a>
</nav>

</body>
</html>
