<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>TRAIL QUEST WORLD - バトル</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ============================================
       Battle Screen
       ============================================ */
    .mobile-frame {
      height: 844px;
    }

    .content {
      padding: 0;
      padding-bottom: 0;
      height: 100%;
    }

    /* Score Bar */
    .battle-score {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px 6px;
      position: relative;
      z-index: 5;
    }

    .battle-score__player {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .battle-score__name {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .battle-score__name--opp {
      color: var(--text-secondary);
    }

    .battle-score__points {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 14px;
      background: var(--bg-glass);
      backdrop-filter: var(--glass-blur);
      border: var(--glass-border);
      border-radius: var(--radius-pill);
    }

    .battle-score__num {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--gold);
    }

    .battle-score__vs {
      font-size: 0.6rem;
      color: var(--text-secondary);
      font-weight: 700;
    }

    /* HUD Bar */
    .battle-hud {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 4px 16px 8px;
      position: relative;
      z-index: 5;
    }

    /* Opponent Field */
    .battle-field--opp {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      position: relative;
    }

    .field-cards {
      display: flex;
      justify-content: center;
      gap: -8px;
      position: relative;
    }

    .field-card {
      width: 64px;
      height: 88px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.5rem;
      font-weight: 700;
      position: relative;
      transition: transform var(--transition-fast);
    }

    .field-card--stacked {
      margin-left: -12px;
    }

    .field-card--stacked:first-child {
      margin-left: 0;
    }

    .field-card--n {
      background: linear-gradient(135deg, #2a2f4a, #1e2340);
      border: 1.5px solid var(--rarity-n);
    }

    .field-card--r {
      background: linear-gradient(135deg, #1a2a4a, #152040);
      border: 1.5px solid var(--rarity-r);
    }

    .field-card--sr {
      background: linear-gradient(135deg, #2a1a3a, #201530);
      border: 1.5px solid var(--rarity-sr);
      box-shadow: 0 2px 8px rgba(155, 89, 182, 0.2);
    }

    .field-card--ssr {
      background: linear-gradient(135deg, #2a2020, #201a10);
      border: 1.5px solid var(--gold);
      box-shadow: 0 2px 10px rgba(255, 215, 0, 0.25);
    }

    .field-card--facedown {
      background: linear-gradient(135deg, #1a1f3a, #0f1428);
      border: 1.5px solid rgba(255, 255, 255, 0.1);
    }

    .field-card--facedown::after {
      content: '?';
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.15);
    }

    .field-card__icon { font-size: 1.1rem; }
    .field-card__name { font-size: 0.45rem; color: var(--text-primary); margin-top: 2px; }
    .field-card__stat { font-size: 0.4rem; color: var(--text-secondary); font-family: var(--font-display); }

    /* Flag / Center */
    .battle-center {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
      position: relative;
      z-index: 5;
    }

    .battle-flag {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: var(--bg-glass);
      backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: var(--radius-pill);
    }

    .battle-flag img {
      width: 16px;
      height: 16px;
    }

    .battle-flag__text {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--gold);
    }

    /* My Field */
    .battle-field--mine {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      position: relative;
    }

    /* My Hand / Deck area */
    .battle-hand {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      position: relative;
      z-index: 5;
    }

    .hand-card {
      width: 56px;
      height: 78px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.45rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition-fast);
    }

    .hand-card:active { transform: translateY(-8px) scale(1.05); }

    .hand-card__icon { font-size: 0.9rem; }
    .hand-card__name { font-size: 0.4rem; color: var(--text-primary); margin-top: 1px; }

    /* Bottom Controls */
    .battle-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px 16px;
      position: relative;
      z-index: 5;
    }

    .battle-controls__deck-info {
      display: flex;
      gap: 8px;
    }

    .btn-turn-end {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: 2px solid var(--gold-light);
      color: #1a1000;
      font-size: 0.6rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
      transition: transform var(--transition-fast);
      font-family: var(--font-main);
    }

    .btn-turn-end:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <nav class="page-nav">
    <a href="home.html">Home</a>
    <a href="deck-select.html">Deck</a>
    <a href="deck-phase.html">Phase</a>
    <a href="battle.html" class="active">Battle</a>
    <a href="quest.html">Quest</a>
    <a href="shop.html">Shop</a>
    <a href="ranking.html">Rank</a>
  </nav>

  <div class="mobile-frame">
    <!-- Battle Background -->
    <img src="assets/backgrounds/bg-battle.png" alt="" class="bg-image">
    <div class="bg-overlay bg-overlay--battle"></div>

    <div class="content content--no-pad-bottom" style="padding: 0; display: flex; flex-direction: column; height: 844px;">

      <!-- Score -->
      <div class="battle-score">
        <div class="battle-score__player">
          <span class="battle-score__name">YOU</span>
        </div>
        <div class="battle-score__points">
          <span class="battle-score__num">2</span>
          <span class="battle-score__vs">VS</span>
          <span class="battle-score__num">1</span>
        </div>
        <div class="battle-score__player">
          <span class="battle-score__name battle-score__name--opp">OPP</span>
        </div>
      </div>

      <!-- HUD -->
      <div class="battle-hud">
        <div class="hud-pill">
          デッキ <span class="hud-pill__value">4</span>
        </div>
        <div class="hud-pill">
          ベンチ <span class="hud-pill__value">2</span>
        </div>
        <div class="hud-pill">
          除外 <span class="hud-pill__value">1</span>
        </div>
      </div>

      <!-- Opponent Field -->
      <div class="battle-field--opp">
        <div class="field-cards">
          <div class="field-card field-card--facedown field-card--stacked"></div>
          <div class="field-card field-card--facedown field-card--stacked"></div>
          <div class="field-card field-card--r field-card--stacked">
            <span class="field-card__icon">🎌</span>
            <span class="field-card__name">武士道</span>
            <span class="field-card__stat">4/5</span>
          </div>
          <div class="field-card field-card--n field-card--stacked">
            <span class="field-card__icon">🏯</span>
            <span class="field-card__name">大阪城</span>
            <span class="field-card__stat">2/4</span>
          </div>
        </div>
      </div>

      <!-- Center Flag -->
      <div class="battle-center">
        <div class="battle-flag">
          <img src="assets/icons/icon-trophy.png" alt="">
          <span class="battle-flag__text">YOU が保持中</span>
        </div>
      </div>

      <!-- My Field -->
      <div class="battle-field--mine">
        <div class="field-cards">
          <div class="field-card field-card--sr field-card--stacked">
            <span class="field-card__icon">⚡</span>
            <span class="field-card__name">雷神</span>
            <span class="field-card__stat">7/4</span>
          </div>
          <div class="field-card field-card--r field-card--stacked">
            <span class="field-card__icon">🌊</span>
            <span class="field-card__name">太平洋</span>
            <span class="field-card__stat">5/3</span>
          </div>
          <div class="field-card field-card--n field-card--stacked">
            <span class="field-card__icon">🗻</span>
            <span class="field-card__name">富士山</span>
            <span class="field-card__stat">3/2</span>
          </div>
        </div>
      </div>

      <!-- My Hand -->
      <div class="battle-hand">
        <div class="hand-card field-card--ssr">
          <span class="hand-card__icon">🐉</span>
          <span class="hand-card__name">龍神</span>
        </div>
        <div class="hand-card field-card--n">
          <span class="hand-card__icon">🌸</span>
          <span class="hand-card__name">桜前線</span>
        </div>
        <div class="hand-card field-card--r">
          <span class="hand-card__icon">🗼</span>
          <span class="hand-card__name">東京タワー</span>
        </div>
        <div class="hand-card field-card--n">
          <span class="hand-card__icon">🍣</span>
          <span class="hand-card__name">寿司</span>
        </div>
      </div>

      <!-- Bottom Controls -->
      <div class="battle-controls">
        <div class="battle-controls__deck-info">
          <div class="hud-pill">
            手札 <span class="hud-pill__value">4</span>
          </div>
        </div>
        <button class="btn-turn-end">ターン<br>終了</button>
      </div>
    </div>
  </div>
</body>
</html>
